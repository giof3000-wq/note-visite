<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>Note Visite Pro</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#f5f4f1;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --border:rgba(0,0,0,0.10);
  --border2:rgba(0,0,0,0.18);
  --text:#1a1a18;
  --text2:#6b6b66;
  --accent:#1a1a18;
  --green:#2d7a2d;
  --red:#c0392b;
  --radius:12px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

header{
  background:var(--surface);
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

header h1{
  font-size:20px;
}

header p{
  font-size:13px;
  color:var(--text2);
  margin-top:3px;
}

.content{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.section{
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:0.4px;
}

input,
textarea{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--surface);
  font-size:15px;
  color:var(--text);
}

textarea{
  resize:vertical;
  line-height:1.6;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  opacity:0.95;
}

.status{
  margin-top:16px;
  padding:14px;
  border-radius:10px;
  background:var(--surface2);
  font-size:14px;
}

.card{
  background:var(--surface);
  border-radius:12px;
  border:1px solid var(--border);
  padding:16px;
  margin-bottom:12px;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin-right:5px;
  margin-top:5px;
  background:#ececec;
}

.green{
  color:var(--green);
}

.red{
  color:var(--red);
}

</style>
</head>

<body>

<header>
  <h1>Note Visite Pro</h1>
  <p>AI + Drive + Calendar</p>
</header>

<div class="content">

  <div class="section">
    <label>Cliente</label>

    <input
      type="text"
      id="cliente"
      placeholder="Es. D'Introno"
    >
  </div>

  <div class="section">
    <label>Note visita</label>

    <textarea
      id="noteText"
      rows="7"
      placeholder="Scrivi liberamente..."
    ></textarea>
  </div>

  <div class="section">
    <label>Promemoria tra</label>

    <input
      type="range"
      min="5"
      max="30"
      value="10"
      id="daysSlider"
    >

    <div style="margin-top:8px;">
      <span id="daysValue">10</span> giorni
    </div>
  </div>

  <div class="section">
    <button onclick="driveLogin()">
      Connetti Google
    </button>
  </div>

  <div class="section">
    <button onclick="elabora()">
      Elabora · Salva · Crea Promemoria
    </button>
  </div>

  <div
    class="status"
    id="status"
  >
    Pronto
  </div>

  <div
    id="results"
    style="margin-top:20px;"
  ></div>

</div>

<script src="https://accounts.google.com/gsi/client"></script>

<script>

const CLIENT_ID =
'861244244527-vtr1oohc8n3pb22ior3g5m7tp1a9u858.apps.googleusercontent.com';

const SCOPES =
'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.events';

const DEFAULT_BRANDS = [
  'Megius',
  'Mobilduenne',
  'Navarti',
  'Zenon',
  'Sichenia',
  'Serenissima'
];

const DEBUG = true;

let tokenClient = null;

let accessToken =
  localStorage.getItem('drive_token') || null;

let tokenExpiry =
  parseInt(
    localStorage.getItem(
      'drive_token_expiry'
    ) || '0'
  );

let savedKey =
  localStorage.getItem(
    'openai_key'
  ) || '';

document
.getElementById('daysSlider')
.addEventListener('input', function(){

  document
  .getElementById('daysValue')
  .textContent = this.value;
});

function log(...args){

  if(DEBUG){

    console.log(...args);
  }
}

function setStatus(msg){

  document
  .getElementById('status')
  .innerHTML = msg;
}

window.onload = () => {

  initGoogle();

  if(!savedKey){

    const k = prompt(
      'Inserisci OpenAI API Key'
    );

    if(k){

      localStorage.setItem(
        'openai_key',
        k
      );

      savedKey = k;
    }
  }
};

function initGoogle(){

  tokenClient =
    google.accounts.oauth2.initTokenClient({

      client_id:CLIENT_ID,

      scope:SCOPES,

      callback:async(resp)=>{

        if(resp.error){

          console.error(resp);

          setStatus(
            'Errore login Google'
          );

          return;
        }

        accessToken =
          resp.access_token;

        tokenExpiry =
          Date.now() +
          (resp.expires_in * 1000);

        localStorage.setItem(
          'drive_token',
          accessToken
        );

        localStorage.setItem(
          'drive_token_expiry',
          tokenExpiry
        );

        setStatus(
          'Google collegato ✓'
        );

        await verificaGoogleServices();
      }
    });
}

async function verificaGoogleServices(){

  try{

    const driveCheck =
      await fetch(
        'https://www.googleapis.com/drive/v3/about?fields=user',
        {
          headers:{
            Authorization:
              'Bearer ' + accessToken
          }
        }
      );

    if(!driveCheck.ok){

      throw new Error(
        'Drive API non disponibile'
      );
    }

    const calCheck =
      await fetch(
        'https://www.googleapis.com/calendar/v3/users/me/calendarList',
        {
          headers:{
            Authorization:
              'Bearer ' + accessToken
          }
        }
      );

    if(!calCheck.ok){

      const err =
        await calCheck.json();

      console.error(err);

      setStatus(
        '⚠ Attiva Google Calendar API nel progetto Cloud'
      );

      return;
    }

    setStatus(
      'Drive + Calendar connessi ✓'
    );

  }catch(e){

    console.error(e);

    setStatus(
      'Errore verifica Google APIs'
    );
  }
}

function isTokenValid(){

  return (
    accessToken &&
    Date.now() <
    tokenExpiry - 60000
  );
}

function driveLogin(){

  tokenClient.requestAccessToken({
    prompt:'consent'
  });
}

async function elabora(){

  const cliente =
    document
    .getElementById('cliente')
    .value
    .trim();

  const note =
    document
    .getElementById('noteText')
    .value
    .trim();

  const giorni =
    parseInt(
      document
      .getElementById('daysSlider')
      .value
    );

  if(!cliente){

    setStatus(
      'Inserisci cliente'
    );

    return;
  }

  if(!note){

    setStatus(
      'Inserisci note'
    );

    return;
  }

  if(!savedKey){

    setStatus(
      'Manca API Key OpenAI'
    );

    return;
  }

  if(!isTokenValid()){

    setStatus(
      'Connetti Google'
    );

    return;
  }

  try{

    setStatus(
      'AI in elaborazione...'
    );

    const aiData =
      await analizzaConAI(
        cliente,
        note
      );

    renderAI(aiData);

    setStatus(
      'Creazione cartelle Drive...'
    );

    const rootId =
      await getOrCreateFolder(
        'Note Visite'
      );

    const now =
      new Date();

    const yearFolder =
      await getOrCreateFolder(
        now.getFullYear().toString(),
        rootId
      );

    const monthFolder =
      await getOrCreateFolder(
        now.toLocaleDateString(
          'it-IT',
          {month:'long'}
        ),
        yearFolder
      );

    for(const brand of aiData.brand_estratti){

      const contenuto =
`CLIENTE:
${cliente}

BRAND:
${brand.brand}

SITUAZIONE:
${brand.situazione}

AZIONI:
${(brand.azioni || [])
.map(a=>'• ' + a)
.join('\n')}

NOTE:
${note}
`;

      const nomeFile =
`${cliente}_${brand.brand}_${Date.now()}.txt`;

      await uploadFile(
        nomeFile,
        contenuto,
        monthFolder
      );
    }

    setStatus(
      'File salvati su Drive ✓'
    );

    const promemoria =
      new Date();

    promemoria.setDate(
      promemoria.getDate() +
      giorni
    );

    await creaEventoCalendar(
      cliente,
      aiData,
      promemoria
    );

    setStatus(
      'Workflow completato ✓'
    );

  }catch(e){

    console.error(e);

    setStatus(
      'Errore: ' + e.message
    );
  }
}

async function analizzaConAI(
  cliente,
  note
){

  const res =
    await fetch(
      'https://api.openai.com/v1/chat/completions',
      {
        method:'POST',

        headers:{
          'Content-Type':
            'application/json',

          Authorization:
            'Bearer ' + savedKey
        },

        body:JSON.stringify({

          model:'gpt-4o-mini',

          response_format:{
            type:'json_object'
          },

          messages:[
            {
              role:'system',

              content:
`Analizza note commerciali.

Rispondi SOLO JSON:

{
  "riassunto_visita":"",
  "brand_estratti":[
    {
      "brand":"",
      "situazione":"",
      "interesse":"",
      "azioni":[]
    }
  ]
}`
            },

            {
              role:'user',

              content:
`Cliente:
${cliente}

Note:
${note}`
            }
          ]
        })
      }
    );

  const data =
    await res.json();

  const raw =
    data
    .choices?.[0]
    ?.message
    ?.content || '{}';

  return JSON.parse(raw);
}

function renderAI(data){

  const results =
    document
    .getElementById('results');

  results.innerHTML =
`
<div class="card">
  <h3>
    Riassunto visita
  </h3>

  <div style="margin-top:10px;">
    ${data.riassunto_visita}
  </div>
</div>

${(data.brand_estratti || [])
.map(b=>`
<div class="card">

  <div>
    <span class="badge">
      ${b.brand}
    </span>

    <span class="badge">
      interesse ${b.interesse}
    </span>
  </div>

  <div style="margin-top:12px;">
    ${b.situazione}
  </div>

  <div style="margin-top:12px;">

    ${(b.azioni || [])
    .map(a=>`
      <div>
        → ${a}
      </div>
    `)
    .join('')}

  </div>

</div>
`)
.join('')}
`;
}

async function getOrCreateFolder(
  name,
  parentId=null
){

  let q =
`name='${name}'
and mimeType='application/vnd.google-apps.folder'
and trashed=false`;

  if(parentId){

    q +=
` and '${parentId}' in parents`;
  }

  const res =
    await fetch(
      `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`,
      {
        headers:{
          Authorization:
            'Bearer ' + accessToken
        }
      }
    );

  const data =
    await res.json();

  if(data.files.length){

    return data.files[0].id;
  }

  const meta = {
    name:name,
    mimeType:
      'application/vnd.google-apps.folder'
  };

  if(parentId){

    meta.parents = [parentId];
  }

  const create =
    await fetch(
      'https://www.googleapis.com/drive/v3/files',
      {
        method:'POST',

        headers:{
          Authorization:
            'Bearer ' + accessToken,

          'Content-Type':
            'application/json'
        },

        body:
          JSON.stringify(meta)
      }
    );

  const created =
    await create.json();

  return created.id;
}

async function uploadFile(
  nome,
  contenuto,
  folderId
){

  const boundary =
    'notevisiteboundary';

  const metadata = {
    name:nome,
    parents:[folderId],
    mimeType:'text/plain'
  };

  const body =
`--${boundary}
Content-Type: application/json; charset=UTF-8

${JSON.stringify(metadata)}

--${boundary}
Content-Type: text/plain

${contenuto}

--${boundary}--`;

  const res =
    await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {
        method:'POST',

        headers:{
          Authorization:
            'Bearer ' + accessToken,

          'Content-Type':
            `multipart/related; boundary=${boundary}`
        },

        body:body
      }
    );

  if(!res.ok){

    const err =
      await res.text();

    console.error(err);

    throw new Error(
      'Errore upload Drive'
    );
  }
}

async function creaEventoCalendar(
  cliente,
  aiData,
  dataPromemoria
){

  const startDate =
    new Date(dataPromemoria);

  const endDate =
    new Date(dataPromemoria);

  endDate.setDate(
    endDate.getDate() + 1
  );

  const formatDate = (d)=>{

    return `${d.getFullYear()}-${String(
      d.getMonth()+1
    ).padStart(2,'0')}-${String(
      d.getDate()
    ).padStart(2,'0')}`;
  };

  const evento = {

    summary:
      `Revisita ${cliente}`,

    description:
`
${aiData.riassunto_visita}

Brand:
${(aiData.brand_estratti || [])
.map(b=>`• ${b.brand}`)
.join('\n')}
`,

    start:{
      date:
        formatDate(startDate)
    },

    end:{
      date:
        formatDate(endDate)
    },

    reminders:{
      useDefault:false,

      overrides:[
        {
          method:'popup',
          minutes:540
        }
      ]
    }
  };

  const res =
    await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events',
      {
        method:'POST',

        headers:{
          Authorization:
            'Bearer ' + accessToken,

          'Content-Type':
            'application/json'
        },

        body:
          JSON.stringify(evento)
      }
    );

  const result =
    await res.json();

  log(result);

  if(!res.ok){

    throw new Error(
      result.error?.message ||
      'Errore Google Calendar'
    );
  }
}

</script>

</body>
</html>
