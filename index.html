<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Note Visite Pro</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
  color:#222;
}

.container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

input, textarea, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}

button{
  background:#111;
  color:white;
  cursor:pointer;
  border:none;
}

button:hover{
  opacity:0.9;
}

.status{
  margin-top:15px;
  padding:10px;
  background:#f0f0f0;
  border-radius:8px;
}

pre{
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

  <h1>Note Visite Pro</h1>

  <input
    type="text"
    id="cliente"
    placeholder="Nome cliente"
  />

  <textarea
    id="note"
    rows="8"
    placeholder="Scrivi qui le note visita..."
  ></textarea>

  <button onclick="loginGoogle()">
    Connetti Google
  </button>

  <button onclick="salvaVisita()">
    Salva visita + crea promemoria
  </button>

  <div class="status" id="status">
    Pronto
  </div>

</div>

<script src="https://accounts.google.com/gsi/client"></script>

<script>

const CLIENT_ID =
'861244244527-vtr1oohc8n3pb22ior3g5m7tp1a9u858.apps.googleusercontent.com';

const SCOPES =
'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.events';

const DEBUG = true;

let tokenClient = null;
let accessToken = null;
let tokenExpiry = 0;

function log(...args){
  if(DEBUG){
    console.log(...args);
  }
}

function setStatus(msg){
  document.getElementById('status').innerHTML = msg;
}

window.onload = () => {

  tokenClient = google.accounts.oauth2.initTokenClient({

    client_id: CLIENT_ID,

    scope: SCOPES,

    callback: async (resp) => {

      log(resp);

      if(resp.error){

        setStatus('Errore login Google');

        return;
      }

      accessToken = resp.access_token;

      tokenExpiry =
        Date.now() + (resp.expires_in * 1000);

      localStorage.setItem(
        'google_access_token',
        accessToken
      );

      localStorage.setItem(
        'google_token_expiry',
        tokenExpiry
      );

      setStatus('Google connesso ✓');

      await verificaGoogleServices();
    }
  });

  const savedToken =
    localStorage.getItem('google_access_token');

  const savedExpiry =
    localStorage.getItem('google_token_expiry');

  if(savedToken && savedExpiry){

    if(Date.now() < parseInt(savedExpiry)){

      accessToken = savedToken;
      tokenExpiry = parseInt(savedExpiry);

      setStatus('Sessione Google ripristinata ✓');
    }
  }
};

function loginGoogle(){

  tokenClient.requestAccessToken({
    prompt:'consent'
  });
}

function isTokenValid(){

  return (
    accessToken &&
    Date.now() < tokenExpiry
  );
}

async function verificaGoogleServices(){

  try{

    const driveRes = await fetch(
      'https://www.googleapis.com/drive/v3/about?fields=user',
      {
        headers:{
          Authorization:
            'Bearer ' + accessToken
        }
      }
    );

    if(!driveRes.ok){

      throw new Error(
        'Drive API non disponibile'
      );
    }

    const calendarRes = await fetch(
      'https://www.googleapis.com/calendar/v3/users/me/calendarList',
      {
        headers:{
          Authorization:
            'Bearer ' + accessToken
        }
      }
    );

    if(!calendarRes.ok){

      const err = await calendarRes.json();

      console.error(err);

      setStatus(
        '⚠ Devi attivare Google Calendar API nel progetto Cloud'
      );

      return;
    }

    setStatus(
      'Drive + Calendar collegati ✓'
    );

  }catch(e){

    console.error(e);

    setStatus(
      'Errore verifica servizi Google'
    );
  }
}

async function salvaVisita(){

  if(!isTokenValid()){

    setStatus(
      'Connetti Google prima'
    );

    return;
  }

  const cliente =
    document.getElementById('cliente')
    .value
    .trim();

  const note =
    document.getElementById('note')
    .value
    .trim();

  if(!cliente){

    setStatus(
      'Inserisci il cliente'
    );

    return;
  }

  if(!note){

    setStatus(
      'Inserisci le note'
    );

    return;
  }

  try{

    setStatus(
      'Creazione file Drive...'
    );

    const rootFolderId =
      await getOrCreateFolder(
        'Note Visite'
      );

    const oggi = new Date();

    const nomeFile =
      `${cliente}_${Date.now()}.txt`;

    const contenuto = `
CLIENTE: ${cliente}

DATA:
${oggi.toLocaleDateString('it-IT')}

NOTE:
${note}
`;

    await uploadFile(
      nomeFile,
      contenuto,
      rootFolderId
    );

    setStatus(
      'File salvato ✓'
    );

    setStatus(
      'Creazione promemoria Calendar...'
    );

    const promemoria =
      new Date();

    promemoria.setDate(
      promemoria.getDate() + 10
    );

    await creaEventoCalendar(
      cliente,
      note,
      promemoria
    );

    setStatus(
      'Tutto completato ✓'
    );

  }catch(e){

    console.error(e);

    setStatus(
      'Errore: ' + e.message
    );
  }
}

async function getOrCreateFolder(name){

  const q =
    `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;

  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`,
    {
      headers:{
        Authorization:
          'Bearer ' + accessToken
      }
    }
  );

  const data = await res.json();

  if(data.files.length){

    return data.files[0].id;
  }

  const createRes = await fetch(
    'https://www.googleapis.com/drive/v3/files',
    {
      method:'POST',

      headers:{
        Authorization:
          'Bearer ' + accessToken,

        'Content-Type':
          'application/json'
      },

      body:JSON.stringify({

        name:name,

        mimeType:
          'application/vnd.google-apps.folder'
      })
    }
  );

  const created =
    await createRes.json();

  return created.id;
}

async function uploadFile(
  nome,
  contenuto,
  folderId
){

  const boundary =
    'notevisiteboundary';

  const metadata = {
    name:nome,
    parents:[folderId],
    mimeType:'text/plain'
  };

  const body =
`--${boundary}
Content-Type: application/json; charset=UTF-8

${JSON.stringify(metadata)}

--${boundary}
Content-Type: text/plain

${contenuto}

--${boundary}--`;

  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    {
      method:'POST',

      headers:{
        Authorization:
          'Bearer ' + accessToken,

        'Content-Type':
          `multipart/related; boundary=${boundary}`
      },

      body:body
    }
  );

  if(!res.ok){

    const err =
      await res.text();

    console.error(err);

    throw new Error(
      'Errore upload Drive'
    );
  }
}

async function creaEventoCalendar(
  cliente,
  note,
  dataPromemoria
){

  const startDate =
    new Date(dataPromemoria);

  const endDate =
    new Date(dataPromemoria);

  endDate.setDate(
    endDate.getDate() + 1
  );

  const formatDate = (d) => {

    return `${d.getFullYear()}-${String(
      d.getMonth()+1
    ).padStart(2,'0')}-${String(
      d.getDate()
    ).padStart(2,'0')}`;
  };

  const evento = {

    summary:
      `Revisita ${cliente}`,

    description:
      note,

    start:{
      date:
        formatDate(startDate)
    },

    end:{
      date:
        formatDate(endDate)
    },

    reminders:{
      useDefault:false,

      overrides:[
        {
          method:'popup',
          minutes:540
        }
      ]
    }
  };

  const res = await fetch(
    'https://www.googleapis.com/calendar/v3/calendars/primary/events',
    {
      method:'POST',

      headers:{
        Authorization:
          'Bearer ' + accessToken,

        'Content-Type':
          'application/json'
      },

      body:
        JSON.stringify(evento)
    }
  );

  const result =
    await res.json();

  log(result);

  if(!res.ok){

    throw new Error(
      result.error?.message ||
      'Errore Calendar'
    );
  }
}

</script>

</body>
</html>
